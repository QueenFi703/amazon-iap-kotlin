name: AWS Gradle Pipeline (S3 + CodeArtifact + Device Farm)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  S3_BUCKET: ${{ vars.S3_BUCKET }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Restart agents service
        run: sudo systemctl restart actions-runner* 2>/dev/null || true

      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build + test
        run: |
          ./gradlew build
          ./gradlew test --no-daemon

      - name: Assemble release artifacts (APK/AAB)
        run: |
          ./gradlew :app:assembleRelease :app:bundleRelease

      - name: Upload build outputs to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-outputs
          path: |
            app/build/outputs/apk/**/*
            app/build/outputs/bundle/**/*
            dist/**/*

  publish_s3:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: android-build-outputs
          path: _artifacts

      - name: Configure AWS credentials (long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create S3 bucket if missing (us-east-1)
        shell: bash
        run: |
          set -euo pipefail
          if aws s3api head-bucket --bucket "${S3_BUCKET}" 2>/dev/null; then
            echo "Bucket exists: ${S3_BUCKET}"
          else
            echo "Creating bucket: ${S3_BUCKET}"
            # us-east-1: do NOT pass LocationConstraint
            aws s3api create-bucket --bucket "${S3_BUCKET}"
          fi

      - name: Upload artifacts to S3 (immutable path by commit SHA)
        shell: bash
        run: |
          set -euo pipefail
          PREFIX="builds/${GITHUB_REPOSITORY}/${GITHUB_SHA}"
          aws s3 sync "_artifacts" "s3://${S3_BUCKET}/${PREFIX}/" --no-progress

          cat > release-manifest.json <<EOF
          {
            "repo": "${GITHUB_REPOSITORY}",
            "sha": "${GITHUB_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "bucket": "${S3_BUCKET}",
            "prefix": "${PREFIX}"
          }
          EOF

          aws s3 cp release-manifest.json "s3://${S3_BUCKET}/${PREFIX}/release-manifest.json" --no-progress

  publish_codeartifact:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >
      github.ref == 'refs/heads/main' &&
      vars.CODEARTIFACT_DOMAIN != '' &&
      vars.CODEARTIFACT_REPOSITORY != '' &&
      vars.CODEARTIFACT_DOMAIN_OWNER != ''

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get CodeArtifact auth token
        id: ca
        shell: bash
        run: |
          set -euo pipefail
          TOKEN="$(aws codeartifact get-authorization-token \
            --domain "${{ vars.CODEARTIFACT_DOMAIN }}" \
            --domain-owner "${{ vars.CODEARTIFACT_DOMAIN_OWNER }}" \
            --query authorizationToken --output text)"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Publish :bridge to CodeArtifact
        env:
          CODEARTIFACT_AUTH_TOKEN: ${{ steps.ca.outputs.token }}
          CODEARTIFACT_DOMAIN: ${{ vars.CODEARTIFACT_DOMAIN }}
          CODEARTIFACT_DOMAIN_OWNER: ${{ vars.CODEARTIFACT_DOMAIN_OWNER }}
          CODEARTIFACT_REPOSITORY: ${{ vars.CODEARTIFACT_REPOSITORY }}
        run: |
          ./gradlew :bridge:publish

  device_farm:
    needs: publish_s3
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Secrets cannot be evaluated in job-level `if:` expressions; the actual
    # presence check is done at runtime in the "Check Device Farm secrets" step.
    if: github.ref == 'refs/heads/main'
    env:
      DEVICE_FARM_PROJECT_ARN: ${{ secrets.DEVICE_FARM_PROJECT_ARN }}
      DEVICE_FARM_DEVICE_POOL_ARN: ${{ secrets.DEVICE_FARM_DEVICE_POOL_ARN }}

    steps:
      - name: Check Device Farm secrets
        id: check_df
        shell: bash
        run: |
          if [ -z "${DEVICE_FARM_PROJECT_ARN}" ] || [ -z "${DEVICE_FARM_DEVICE_POOL_ARN}" ]; then
            echo "DEVICE_FARM_PROJECT_ARN or DEVICE_FARM_DEVICE_POOL_ARN not set — skipping Device Farm."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.check_df.outputs.skip != 'true'

      - name: Configure AWS credentials (long-lived keys)
        if: steps.check_df.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build outputs
        if: steps.check_df.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: android-build-outputs
          path: _artifacts

      - name: Upload APK to Device Farm
        if: steps.check_df.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          APK_PATTERN="*/apk/release/*release*.apk"
          mapfile -t APK_CANDIDATES < <(find _artifacts -type f -path "${APK_PATTERN}")
          if [ "${#APK_CANDIDATES[@]}" -eq 0 ]; then
            echo "No release APK found in build outputs matching pattern '${APK_PATTERN}'." && exit 1
          elif [ "${#APK_CANDIDATES[@]}" -gt 1 ]; then
            echo "Expected exactly one release APK, but found ${#APK_CANDIDATES[@]} candidates:" >&2
            printf '  %s\n' "${APK_CANDIDATES[@]}" >&2
            exit 1
          fi
          APK="${APK_CANDIDATES[0]}"
          echo "Uploading release APK: ${APK}"

          UPLOAD_ARN="$(aws devicefarm create-upload \
            --project-arn "${DEVICE_FARM_PROJECT_ARN}" \
            --name "app-${GITHUB_SHA}.apk" \
            --type ANDROID_APP \
            --query upload.arn --output text)"
          URL="$(aws devicefarm get-upload --arn "${UPLOAD_ARN}" --query upload.url --output text)"

          curl -T "${APK}" "${URL}"

          # TODO: schedule a test run once a test package and test framework are defined.
          echo "APK uploaded to Device Farm (ARN: ${UPLOAD_ARN}). Add schedule-run step when tests are ready."
